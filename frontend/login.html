<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart E-Waste Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/logo-512.png">
    <meta name="theme-color" content="#10b981">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered!', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
</head>
<body class="d-flex flex-column" style="min-height: 100vh;">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/index.html">
                <i class="bi bi-recycle text-success me-2 glow-text"></i>
                <span class="text-gradient">SmartEWaste</span>
            </a>
            <div class="ms-auto">
                <a href="/register.html" class="btn btn-outline-neon btn-sm">Register instead</a>
            </div>
        </div>
    </nav>

    <!-- Login Card -->
    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock text-success fs-1 glow-text"></i>
                        <h3 class="mt-2 fw-bold text-white">Unified Login</h3>
                        <p class="text-muted">Users, Collection Centers & Admins</p>
                    </div>

                    <div id="alert-box" class="alert alert-danger" style="display: none;" role="alert"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label text-white">Email Address or Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="text" class="form-control glass-input" id="email" placeholder="email@domain.com or admin" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-white">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control glass-input" id="password" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-neon-green w-100 py-2.5">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                        </button>
                    </form>

                    <div class="mt-4 pt-3 border-top border-secondary border-opacity-10 text-center">
                        <p class="text-muted mb-0 small">
                            Demo accounts:
                            <br><strong>Admin:</strong> admin / admin123
                            <br><strong>Staff:</strong> staff@greenearth.com / staff123
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-3 border-top border-secondary border-opacity-10 text-center">
        <p class="text-muted mb-0 small">&copy; 2026 Smart E-Waste Management System.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const alertBox = document.getElementById('alert-box');
            alertBox.style.display = 'none';

            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save session details
                    localStorage.setItem('user', JSON.stringify(data));
                    
                    alertBox.className = 'alert alert-success';
                    alertBox.innerText = 'Login successful! Redirecting...';
                    alertBox.style.display = 'block';
                    
                    setTimeout(() => {
                        if (data.role === 'ADMIN') {
                            window.location.href = '/admin.html';
                        } else if (data.role === 'STAFF') {
                            window.location.href = '/center.html';
                        } else {
                            window.location.href = '/dashboard.html';
                        }
                    }, 1000);
                } else {
                    alertBox.className = 'alert alert-danger';
                    alertBox.innerText = data.message || 'Login failed';
                    alertBox.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                alertBox.className = 'alert alert-danger';
                alertBox.innerText = 'Server connection error. Please try again.';
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
