<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart E-Waste Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/logo-512.png">
    <meta name="theme-color" content="#10b981">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered!', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
</head>
<body class="d-flex flex-column" style="min-height: 100vh;">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/index.html">
                <i class="bi bi-recycle text-success me-2 glow-text"></i>
                <span class="text-gradient">SmartEWaste</span>
            </a>
            <div class="ms-auto">
                <a href="/login.html" class="btn btn-outline-neon btn-sm">Login instead</a>
            </div>
        </div>
    </nav>

    <!-- Registration Card -->
    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus text-success fs-1 glow-text"></i>
                        <h3 class="mt-2 fw-bold text-white">Create Account</h3>
                        <p class="text-muted">Start recycling and earning rewards</p>
                    </div>

                    <div id="alert-box" class="alert alert-danger" style="display: none;" role="alert"></div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="name" class="form-label text-white">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control glass-input" id="name" placeholder="John Doe" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label text-white">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control glass-input" id="email" placeholder="john@example.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label text-white">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="bi bi-telephone"></i></span>
                                <input type="tel" class="form-control glass-input" id="phone" placeholder="+91 98765 43210" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-white">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control glass-input" id="password" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-neon-green w-100 py-2.5">
                            <i class="bi bi-check-circle me-1"></i> Register Now
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted small mb-0">By signing up, you agree to our environmental conservation terms.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-3 border-top border-secondary border-opacity-10 text-center">
        <p class="text-muted mb-0 small">&copy; 2026 Smart E-Waste Management System.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            const alertBox = document.getElementById('alert-box');
            alertBox.style.display = 'none';

            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alertBox.className = 'alert alert-success';
                    alertBox.innerText = 'Registration successful! Redirecting to login...';
                    alertBox.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    alertBox.className = 'alert alert-danger';
                    alertBox.innerText = data.message || 'Registration failed';
                    alertBox.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                alertBox.className = 'alert alert-danger';
                alertBox.innerText = 'Server connection error. Please try again.';
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
