<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit E-Waste - Smart E-Waste Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/index.html">
                <i class="bi bi-recycle text-success me-2 glow-text"></i>
                <span class="text-gradient">SmartEWaste</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="/index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom active" href="/dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="/rewards.html">Rewards</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom text-danger" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="glass-card">
                    <div class="d-flex align-items-center mb-4">
                        <a href="/dashboard.html" class="btn btn-outline-neon btn-sm me-3"><i class="bi bi-arrow-left"></i></a>
                        <div>
                            <h3 class="fw-bold text-white mb-0">Submit E-Waste Details</h3>
                            <p class="text-muted mb-0">Fill in the fields to generate a disposal QR Code</p>
                        </div>
                    </div>

                    <div id="alert-box" class="alert alert-danger" style="display: none;" role="alert"></div>

                    <form id="submitWasteForm" enctype="multipart/form-data">
                        <div class="row g-3 mb-4">
                            <!-- Device Type -->
                            <div class="col-md-6">
                                <label for="deviceName" class="form-label text-white fw-medium">Device Type</label>
                                <select class="form-select glass-input" id="deviceName" required>
                                    <option value="" disabled selected>Select device...</option>
                                    <option value="Mobile">Mobile Phone</option>
                                    <option value="Laptop">Laptop</option>
                                    <option value="Battery">Battery pack</option>
                                    <option value="TV">Television</option>
                                    <option value="Monitor">Monitor</option>
                                    <option value="Keyboard">Keyboard</option>
                                    <option value="Mouse">Mouse</option>
                                    <option value="Printer">Printer</option>
                                </select>
                            </div>

                            <!-- Quantity -->
                            <div class="col-md-6">
                                <label for="quantity" class="form-label text-white fw-medium">Quantity</label>
                                <input type="number" class="form-control glass-input" id="quantity" min="1" max="100" value="1" required>
                            </div>

                            <!-- Device Condition -->
                            <div class="col-md-6">
                                <label for="condition" class="form-label text-white fw-medium">Device Condition</label>
                                <select class="form-select glass-input" id="condition" required>
                                    <option value="" disabled selected>Select condition...</option>
                                    <option value="Working">Working (Used / Old)</option>
                                    <option value="Damaged">Damaged (Broken screen / parts)</option>
                                    <option value="Dead">Dead (Non-functional / Scrap)</option>
                                </select>
                            </div>

                            <!-- Collection Center -->
                            <div class="col-md-6">
                                <label for="centerId" class="form-label text-white fw-medium">Drop-off Collection Center</label>
                                <div class="input-group">
                                    <select class="form-select glass-input" id="centerId" required>
                                        <option value="" disabled selected>Loading collection centers...</option>
                                    </select>
                                    <button class="btn btn-outline-neon" type="button" id="detectLocationBtn" onclick="selectNearestCenter()" title="Detect and Select Nearest Center">
                                        <i class="bi bi-geo-alt-fill"></i>
                                    </button>
                                </div>
                                <small id="nearestCenterInfo" class="text-success mt-1 d-block" style="display: none; font-size: 0.85em;"></small>
                            </div>

                            <!-- Photo Upload -->
                            <div class="col-12">
                                <label for="photo" class="form-label text-white fw-medium">Upload Device Photo <span class="text-muted">(Optional)</span></label>
                                <input type="file" class="form-control glass-input" id="photo" accept="image/*">
                                <small class="text-muted d-block mt-1">Format: JPG, PNG. Max: 10MB.</small>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-neon-green w-100 py-3 mt-2" id="submitBtn">
                            <i class="bi bi-qr-code me-1"></i> Generate QR & Submit E-Waste
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-4 mt-auto border-top border-secondary border-opacity-10 text-center">
        <p class="text-muted mb-0 small">&copy; 2026 Smart E-Waste Management System.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let userId = null;

        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = '/login.html';
                return;
            }

            const user = JSON.parse(userStr);
            if (user.role !== 'USER') {
                localStorage.clear();
                window.location.href = '/login.html';
                return;
            }

            userId = user.userId;
            loadCenters();
        });

        async function loadCenters() {
            const dropdown = document.getElementById('centerId');
            try {
                const response = await fetch('/api/centers');
                if (response.ok) {
                    const centers = await response.json();
                    dropdown.innerHTML = '<option value="" disabled selected>Select drop-off center...</option>';
                    centers.forEach(c => {
                        dropdown.innerHTML += `<option value="${c.centerId}">${c.centerName} (${c.location})</option>`;
                    });
                } else {
                    dropdown.innerHTML = '<option value="" disabled>Error loading centers</option>';
                }
            } catch (err) {
                console.error(err);
                dropdown.innerHTML = '<option value="" disabled>Connection error</option>';
            }
        }

        async function selectNearestCenter() {
            const infoText = document.getElementById('nearestCenterInfo');
            const detectBtn = document.getElementById('detectLocationBtn');
            const dropdown = document.getElementById('centerId');

            infoText.style.display = 'none';
            detectBtn.innerHTML = '<span class="spinner-border spinner-border-sm text-success" role="status"></span>';
            detectBtn.disabled = true;

            if (!navigator.geolocation) {
                alert('Geolocation is not supported by your browser.');
                detectBtn.innerHTML = '<i class="bi bi-geo-alt-fill"></i>';
                detectBtn.disabled = false;
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    try {
                        const response = await fetch(`/api/centers/nearby?latitude=${lat}&longitude=${lon}`);
                        if (response.ok) {
                            const centers = await response.json();
                            if (centers.length > 0) {
                                const nearest = centers[0];
                                dropdown.value = nearest.centerId;
                                infoText.innerText = `📍 Auto-selected nearest: ${nearest.centerName} (${nearest.distance} km away)`;
                                infoText.style.display = 'block';
                            } else {
                                alert('No collection centers found nearby.');
                            }
                        } else {
                            alert('Could not find nearby centers from server.');
                        }
                    } catch (err) {
                        console.error(err);
                        alert('Server connection error while detecting nearby centers.');
                    } finally {
                        detectBtn.innerHTML = '<i class="bi bi-geo-alt-fill"></i>';
                        detectBtn.disabled = false;
                    }
                },
                (error) => {
                    console.error(error);
                    alert('Geolocation permission denied or unavailable.');
                    detectBtn.innerHTML = '<i class="bi bi-geo-alt-fill"></i>';
                    detectBtn.disabled = false;
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        }

        document.getElementById('submitWasteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alert-box');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status"></span> Generating QR Code...';
            alertBox.style.display = 'none';

            const deviceName = document.getElementById('deviceName').value;
            const quantity = document.getElementById('quantity').value;
            const condition = document.getElementById('condition').value;
            const centerId = document.getElementById('centerId').value;
            const photoInput = document.getElementById('photo');

            // Build Multipart Form Data
            const formData = new FormData();
            formData.append('userId', userId);
            formData.append('deviceName', deviceName);
            formData.append('quantity', quantity);
            formData.append('condition', condition);
            formData.append('centerId', centerId);
            
            if (photoInput.files[0]) {
                formData.append('photo', photoInput.files[0]);
            }

            try {
                const response = await fetch('/api/waste/submit', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    alertBox.className = 'alert alert-success';
                    alertBox.innerText = 'E-waste details registered successfully! Redirecting...';
                    alertBox.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    alertBox.className = 'alert alert-danger';
                    alertBox.innerText = data.message || 'Submission failed';
                    alertBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-qr-code me-1"></i> Generate QR & Submit E-Waste';
                }
            } catch (err) {
                console.error(err);
                alertBox.className = 'alert alert-danger';
                alertBox.innerText = 'Connection error. Please check your network and try again.';
                alertBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-qr-code me-1"></i> Generate QR & Submit E-Waste';
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
